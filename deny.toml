# cargo-deny configuration (schema for cargo-deny >= 0.16).
# Lint-level fields that used to control severity (vulnerability, notice,
# unlicensed, copyleft, default, ...) were removed in PR #611: those checks
# now always error when they match. See:
# https://github.com/EmbarkStudios/cargo-deny/pull/611

[graph]
# If 1 or more target triples are specified, only those targets are checked.
targets = []
# Collect metadata with --all-features / --no-default-features.
all-features = false
no-default-features = false

[output]
# Depth at which feature edges are added to inclusion graphs in diagnostics.
feature-depth = 1

# This section is considered when running `cargo deny check advisories`.
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
# The url(s) of the advisory databases to use.
db-urls = ["https://github.com/rustsec/advisory-db"]
# Which crates to consider for the unmaintained check. As of cargo-deny 0.16
# this is a scope selector, not a lint level: "all" | "workspace" |
# "transitive" | "none". Unmaintained hits are always reported as errors.
unmaintained = "workspace"
# Lint level for yanked crates: still accepts "deny" | "warn" | "allow".
yanked = "warn"
# Advisory IDs to ignore (still reported as a note when encountered).
ignore = [
    #"RUSTSEC-0000-0000",
]

# This section is considered when running `cargo deny check licenses`.
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
# List of explicitly allowed licenses (SPDX identifiers). A crate whose
# license is not in this list now errors by default.
allow = [
    "MIT",
    "Apache-2.0",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    #"Apache-2.0 WITH LLVM-exception",
]
# Confidence threshold for detecting a license from its text (0.0 - 1.0).
confidence-threshold = 0.8
# Allow 1 or more licenses on a per-crate basis.
exceptions = [
    #{ allow = ["Zlib"], name = "adler32", version = "*" },
]

# Manual clarification for crates without machine-readable licensing.
#[[licenses.clarify]]
#name = "ring"
#version = "*"
#expression = "MIT AND ISC AND OpenSSL"
#license-files = [
#    { path = "LICENSE", hash = 0xbd0eed23 }
#]

[licenses.private]
# If true, ignores workspace crates that aren't published, or are only
# published to private registries.
ignore = false
registries = [
    #"https://sekretz.com/registry",
]

# This section is considered when running `cargo deny check bans`.
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`.
wildcards = "allow"
# Graph highlighting for crates with multiple versions.
highlight = "all"
# Default lint level for `default` features of workspace / external crates.
workspace-default-features = "allow"
external-default-features = "allow"
# List of crates that are allowed. Use with care!
allow = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# List of crates to deny.
deny = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# Crates/versions skipped during duplicate detection.
skip = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# Like `skip`, but also skips the entire transitive dependency tree.
skip-tree = [
    #{ name = "ansi_term", version = "=0.11.0", depth = 20 },
]

# This section is considered when running `cargo deny check sources`.
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
# Lint level for a crate from a registry not in the allow list.
unknown-registry = "warn"
# Lint level for a crate from a git repository not in the allow list.
unknown-git = "warn"
# Allowed crate registries (defaults to crates.io if not specified).
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allowed git repositories.
allow-git = []

[sources.allow-org]
# 1 or more github.com / gitlab.com / bitbucket.org orgs to allow git sources for.
github = []
gitlab = []
bitbucket = []
