[server]
# Host the weather API binds to. Use "0.0.0.0" to listen on all interfaces.
host = "0.0.0.0"
# Port the weather API binds to.
port = 3000
# How often the `serve` command re-fetches the latest sol, in seconds.
refresh_interval_secs = 3600

[weather]
# Total request timeout for fetching weather data, in seconds.
request_timeout_secs = 5
# Connection establishment timeout, in seconds.
connect_timeout_secs = 3
